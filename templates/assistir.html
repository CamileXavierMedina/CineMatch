<!doctype html>
<html lang="pt-pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineMatch - Quero Assistir</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      /* ESTILO COSPLAY NETFLIX - ESCURO COM DETALHES EM VERMELHO VIBRANTE */
      body {
        background-color: #141414;
        color: #ffffff;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        padding-top: 100px;
      }

      /* BARRA DE NAVEGACAO ESTILO CABECALHO DA NETFLIX */
      .navbar-custom {
        background-color: #000000;
        border-bottom: 2px solid #1f1f1f;
      }

      .navbar-logo {
        color: #e50914 !important;
        font-size: 2.6rem;
        letter-spacing: 2px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9);
      }

      /* BOTAO DE VOLTAR MINIMALISTA ESTILO NETFLIX */
      .btn-voltar {
        background-color: transparent !important;
        color: #ffffff !important;
        border: 1px solid #ffffff !important;
        font-weight: bold;
        transition: background-color 0.2s, border-color 0.2s;
      }

      .btn-voltar:hover {
        background-color: #ffffff !important;
        color: #000000 !important;
        border-color: #ffffff !important;
      }

      /* SECCAO DE CONTEUDO PRINCIPAL */
      .titulo-pagina {
        font-weight: 800;
        font-size: 1.8rem;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
      }

      /* BOTOES ESTILO NETFLIX */
      .btn-netflix-red {
        background-color: #e50914 !important;
        color: #ffffff !important;
        border: none !important;
        font-weight: bold;
        transition: background-color 0.2s;
      }

      .btn-netflix-red:hover {
        background-color: #b80710 !important;
      }

      /* CARCACA DA TABELA ESTILO NETFLIX */
      .table-netflix {
        background-color: #181818 !important;
        border: 1px solid #2f2f2f !important;
        border-collapse: separate;
        border-spacing: 0;
        border-radius: 6px;
        overflow: hidden;
      }

      .table-netflix th {
        background-color: #000000 !important;
        color: #e50914 !important;
        font-weight: bold;
        border-bottom: 2px solid #2f2f2f !important;
        text-transform: uppercase;
        font-size: 0.85rem;
        padding: 15px;
      }

      .table-netflix td {
        background-color: #181818 !important;
        border-bottom: 1px solid #2f2f2f !important;
        padding: 15px;
        color: #cccccc;
      }

      .table-netflix tbody tr:last-child td {
        border-bottom: none !important;
      }

      .table-netflix tbody tr:hover td {
        background-color: #222222 !important;
      }

      .img-poster-tabela {
        width: 45px;
        height: 68px;
        object-fit: cover;
        border-radius: 4px;
        background-color: #2b2b2b;
        border: 1px solid #444;
      }

      /* MODAIS ESTILO NETFLIX */
      .modal-erro-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      .modal-erro-overlay.mostrar {
        opacity: 1;
        pointer-events: auto;
      }

      .modal-erro-container {
        background-color: #181818;
        border: 2px solid #e50914;
        border-radius: 8px;
        width: 90%;
        max-width: 550px;
        padding: 25px;
        position: relative;
        box-shadow: 0 10px 30px rgba(229, 9, 20, 0.3);
        transform: scale(0.8);
        transition: transform 0.3s ease;
      }

      .modal-erro-overlay.mostrar .modal-erro-container {
        transform: scale(1);
      }

      .btn-fechar-modal {
        position: absolute;
        top: 15px;
        right: 15px;
        background: transparent;
        border: none;
        color: #ffffff;
        font-size: 1.5rem;
        line-height: 1;
        cursor: pointer;
        transition: color 0.2s;
      }

      .btn-fechar-modal:hover {
        color: #e50914;
      }

      .modal-erro-titulo {
        font-size: 1.4rem;
        font-weight: 800;
        color: #e50914;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .form-control-netflix {
        background-color: #2b2b2b !important;
        border: 1px solid #444 !important;
        color: #ffffff !important;
      }

      .form-control-netflix::placeholder {
        color: #999999 !important;
      }

      /* RESULTADOS DE BUSCA RAPIDA NO MODAL */
      .item-busca-modal {
        background-color: #2b2b2b;
        border: 1px solid #444;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.2s, border-color 0.2s;
      }

      .item-busca-modal:hover {
        background-color: #3e3e3e;
        border-color: #e50914;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-custom py-2 shadow-lg fixed-top">
      <div class="container d-flex justify-content-center align-items-center position-relative">
        <a href="/" class="btn btn-voltar btn-sm position-absolute start-0 ms-3">
          <i class="bi bi-chevron-left"></i> Voltar
        </a>
        <span class="navbar-brand navbar-logo fw-bold d-flex align-items-center gap-2">
          <i class="bi bi-play-btn-fill"></i> CINEMATCH
        </span>
      </div>
    </nav>

    <div class="container pb-5">
      <div class="d-flex justify-content-between align-items-center mt-2 mb-4 flex-wrap gap-3">
        <div class="text-start">
          <h1 class="titulo-pagina text-white mb-1">
            Minha Lista de <span class="text-danger">Desejos</span>
          </h1>
          <p class="text-secondary small mb-0">
            Gerencie os filmes que você planeja e pretende assistir a seguir!
          </p>
        </div>
        <button onclick="abrirModalAdicionar()" class="btn btn-netflix-red px-4 py-2">
          <i class="bi bi-plus-lg"></i> Adicionar à Lista
        </button>
      </div>

      <div class="table-responsive">
        <table class="table table-netflix align-middle mb-0">
          <thead>
            <tr>
              <th scope="col" style="width: 80px">Poster</th>
              <th scope="col">Título do Filme</th>
              <th scope="col" style="width: 120px">Ano</th>
              <th scope="col">Nota / Lembrete Interno</th>
              <th scope="col" class="text-end" style="width: 320px">Ações</th>
            </tr>
          </thead>
          <tbody id="corpoTabelaQueroAssistir">
            <tr id="linhaCarregamento">
              <td colspan="5" class="text-center py-5 text-secondary">
                <div class="spinner-border text-danger mb-3" role="status"></div>
                <div>A aceder à base de dados do Supabase...</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div id="modalAdicionar" class="modal-erro-overlay">
      <div class="modal-erro-container" style="max-height: 90vh; overflow-y: auto">
        <button class="btn-fechar-modal" onclick="fecharModalAdicionar()">
          &times;
        </button>
        <div class="modal-erro-titulo text-white">
          <i class="bi bi-bookmark-plus text-danger"></i> Adicionar à Lista de Desejos
        </div>

        <div id="secaoPesquisaModal" class="mb-3">
          <label class="form-label text-secondary small">Buscar Título na API do TMDB *</label>
          <div class="input-group">
            <input
              type="text"
              id="inputPesquisaModal"
              class="form-control form-control-netflix"
              placeholder="Escreva o nome do filme (Ex: Missão Impossível)"
            />
            <button class="btn btn-netflix-red" type="button" onclick="pesquisarFilmeNoModal()">
              Buscar
            </button>
          </div>
          <div
            id="containerResultadosModal"
            class="mt-2"
            style="max-height: 180px; overflow-y: auto"
          ></div>
        </div>

        <div id="secaoFilmeSelecionado" class="d-none p-3 mb-3 bg-dark border border-secondary rounded">
          <div class="d-flex align-items-center gap-3">
            <img
              id="selecionadoPoster"
              src=""
              style="width: 60px; height: 90px; object-fit: cover"
              class="rounded border border-secondary"
            />
            <div class="flex-grow-1">
              <h6 id="selecionadoAuthorized" class="text-white mb-1 fw-bold"></h6>
              <h6 id="selecionadoTitulo" class="text-white mb-1 fw-bold"></h6>
              <span id="selecionadoAno" class="badge bg-danger"></span>
            </div>
            <button class="btn btn-sm btn-outline-light" onclick="redefinirSelecaoModal()">
              Alterar
            </button>
          </div>
        </div>

        <form id="formAdicionarFilme" onsubmit="salvarNovoFilme(event)" class="mt-3">
          <input type="hidden" id="addTmdbId" />
          <input type="hidden" id="addTitulo" />
          <input type="hidden" id="addAno" />
          <input type="hidden" id="addPoster" />

          <div class="mb-4">
            <label class="form-label text-secondary small">Lembrete / Nota Opcional (Ex: Onde assistir, com quem)</label>
            <textarea
              id="addSinopse"
              class="form-control form-control-netflix"
              rows="3"
              placeholder="Ex: Disponível na Netflix, indicação do fulano..."
            ></textarea>
          </div>

          <div class="text-end d-flex gap-2 justify-content-end">
            <button
              type="button"
              class="btn btn-sm btn-outline-light px-4"
              onclick="fecharModalAdicionar()"
            >
              Cancelar
            </button>
            <button type="submit" id="btnSalvarFilme" class="btn btn-sm btn-netflix-red px-4" disabled>
              Adicionar à Lista
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="modalEditar" class="modal-erro-overlay">
      <div class="modal-erro-container">
        <button class="btn-fechar-modal" onclick="fecharModalEditar()">
          &times;
        </button>
        <div class="modal-erro-titulo text-white">
          <i class="bi bi-pencil-square text-danger"></i> Editar Informações
        </div>
        <form id="formEditarFilme" onsubmit="salvarEdicao(event)">
          <input type="hidden" id="editTmdbId" />
          <div class="mb-3">
            <label class="form-label text-secondary small">Título do Filme</label>
            <input
              type="text"
              id="editTituloExibicao"
              class="form-control form-control-netflix"
              readonly
              disabled
            />
          </div>
          <div class="mb-4">
            <label class="form-label text-secondary small">Editar Lembrete / Nota Interna</label>
            <textarea id="editSinopse" class="form-control form-control-netflix" rows="4"></textarea>
          </div>
          <div class="text-end d-flex gap-2 justify-content-end">
            <button type="button" class="btn btn-sm btn-outline-light px-4" onclick="fecharModalEditar()">
              Cancelar
            </button>
            <button type="submit" class="btn btn-sm btn-netflix-red px-4">
              Atualizar Dados
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="modalErro" class="modal-erro-overlay">
      <div class="modal-erro-container">
        <button class="btn-fechar-modal" onclick="fecharModalErro()">
          &times;
        </button>
        <div class="modal-erro-titulo">
          <i class="bi bi-exclamation-triangle-fill"></i> Falha de Ligação
        </div>
        <p id="modalErroMensagem" class="text-white small mb-4"></p>
        <div class="text-end">
          <button class="btn btn-sm btn-outline-light px-4" onclick="fecharModalErro()">
            Fechar
          </button>
        </div>
      </div>
    </div>

    <script>
      let filmesCarregados = [];

      document.addEventListener("DOMContentLoaded", obterFilmesParaAssistir);

      function exibirModalErro(mensagem) {
        document.getElementById("modalErroMensagem").textContent = mensagem;
        document.getElementById("modalErro").classList.add("mostrar");
      }

      function fecharModalErro() {
        document.getElementById("modalErro").classList.remove("mostrar");
      }

      function abrirModalAdicionar() {
        document.getElementById("formAdicionarFilme").reset();
        redefinirSelecaoModal();
        document.getElementById("modalAdicionar").classList.add("mostrar");
      }

      function fecharModalAdicionar() {
        document.getElementById("modalAdicionar").classList.remove("mostrar");
      }

      function fecharModalEditar() {
        document.getElementById("modalEditar").classList.remove("mostrar");
      }

      function pesquisarFilmeNoModal() {
        const query = document.getElementById("inputPesquisaModal").value.trim();
        const container = document.getElementById("containerResultadosModal");
        if (!query) return;

        container.innerHTML = `<div class="text-center py-2 text-secondary small"><span class="spinner-border spinner-border-sm text-danger me-2"></span>A buscar filmes...</div>`;

        fetch(`/api/buscar?query=${encodeURIComponent(query)}`)
          .then((res) => {
            if (!res.ok) {
              return res.json().then((dadosErro) => {
                throw new Error(dadosErro.erro || `Erro HTTP ${res.status}`);
              });
            }
            return res.json();
          })
          .then((data) => {
            container.innerHTML = "";
            if (!data || !Array.isArray(data) || data.length === 0) {
              container.innerHTML = `<div class="text-center text-secondary small py-2">Nenhum título encontrado para "${query}"</div>`;
              return;
            }

            data.forEach((filme) => {
              const poster_url = filme.poster_path || "https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=300&auto=format&fit=crop";
              
              const item = document.createElement("div");
              item.className = "item-busca-modal p-2 d-flex align-items-center gap-2 mb-2";
              item.innerHTML = `
                <img src="${poster_url}" style="width: 35px; height: 50px; object-fit: cover;" class="rounded">
                <div class="text-start">
                  <div class="text-white small fw-bold mb-0">${filme.titulo}</div>
                  <span class="text-secondary small" style="font-size: 0.75rem;">${filme.ano}</span>
                </div>
              `;
              
              item.onclick = function() {
                selecionarFilmeNoModal(filme);
              };

              container.appendChild(item);
            });
          })
          .catch((err) => {
            container.innerHTML = `<div class="text-center text-danger small py-2">Erro: ${err.message}</div>`;
          });
      }

      function selecionarFilmeNoModal(filme) {
        document.getElementById("addTmdbId").value = filme.tmdb_id;
        document.getElementById("addTitulo").value = filme.titulo;
        document.getElementById("addAno").value = filme.ano;
        document.getElementById("addPoster").value = filme.poster_path || "";

        document.getElementById("selecionadoPoster").src = filme.poster_path || "https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=300&auto=format&fit=crop";
        document.getElementById("selecionadoTitulo").textContent = filme.titulo;
        document.getElementById("selecionadoAno").textContent = filme.ano;

        document.getElementById("secaoPesquisaModal").classList.add("d-none");
        document.getElementById("secaoFilmeSelecionado").classList.remove("d-none");
        document.getElementById("btnSalvarFilme").removeAttribute("disabled");
      }

      function redefinirSelecaoModal() {
        document.getElementById("addTmdbId").value = "";
        document.getElementById("addTitulo").value = "";
        document.getElementById("addAno").value = "";
        document.getElementById("addPoster").value = "";
        document.getElementById("inputPesquisaModal").value = "";
        document.getElementById("containerResultadosModal").innerHTML = "";

        document.getElementById("secaoPesquisaModal").className = "mb-3";
        document.getElementById("secaoFilmeSelecionado").className = "d-none p-3 mb-3 bg-dark border border-secondary rounded";
        document.getElementById("btnSalvarFilme").setAttribute("disabled", "true");
      }

      function salvarNovoFilme(event) {
        event.preventDefault();

        const tmdb_id = parseInt(document.getElementById("addTmdbId").value);
        const titulo = document.getElementById("addTitulo").value;
        const ano = document.getElementById("addAno").value;
        const poster_path = document.getElementById("addPoster").value;
        const sinopse = document.getElementById("addSinopse").value.trim();

        if (!tmdb_id || !titulo) {
          exibirModalErro("Por favor, selecione primeiro um filme da lista!");
          return;
        }

        const payload = {
          tmdb_id: tmdb_id,
          titulo: titulo,
          poster_path: poster_path,
          ano: ano,
          sinopse: sinopse, 
          status: "quero",
          nota: 0,
        };

        fetch("/api/favoritar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        })
          .then((res) => {
            if (!res.ok) {
              return res.json().then((dadosErro) => {
                throw new Error(dadosErro.erro || "Não foi possível registar o filme.");
              });
            }
            return res.json();
          })
          .then(() => {
            fecharModalAdicionar();
            obterFilmesParaAssistir();
          })
          .catch((err) => {
            fecharModalAdicionar();
            exibirModalErro("Erro ao adicionar filme: " + err.message);
          });
      }

      function obterFilmesParaAssistir() {
        const container = document.getElementById("corpoTabelaQueroAssistir");

        fetch("/api/listar")
          .then((res) => {
            if (!res.ok) {
              return res.json().then((dadosErro) => {
                throw new Error(dadosErro.erro || "Falha na resposta do servidor.");
              });
            }
            return res.json();
          })
          .then((data) => {
            if (!data || !Array.isArray(data)) {
              throw new Error("Formato de dados inválido recebido.");
            }

            filmesCarregados = data.filter((f) => f.status === "quero");

            if (filmesCarregados.length === 0) {
              container.innerHTML = `
                <tr>
                  <td colspan="5" class="text-center text-secondary py-5">
                    <i class="bi bi-bookmark-plus fs-1 text-danger d-block mb-3"></i>
                    <span>Sua lista está vazia! Clique em "Adicionar à Lista" para planejar seus próximos filmes.</span>
                  </td>
                </tr>
              `;
              return;
            }

            container.innerHTML = "";
            filmesCarregados.forEach((filme) => {
              const posterUrl = filme.poster_path || "https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=300&auto=format&fit=crop";

              container.innerHTML += `
                <tr id="linha-${filme.tmdb_id}">
                  <td>
                    <img src="${posterUrl}" class="img-poster-tabela" alt="${filme.titulo}">
                  </td>
                  <td class="fw-bold text-white">${filme.titulo}</td>
                  <td><span class="badge bg-secondary">${filme.ano}</span></td>
                  <td class="text-truncate" style="max-width: 300px;">${filme.sinopse || '<span class="text-muted small">Nenhum lembrete adicionado.</span>'}</td>
                  <td class="text-end">
                    <div class="d-flex gap-2 justify-content-end">
                      <button onclick="marcarComoAssistido(${filme.tmdb_id})" class="btn btn-sm btn-netflix-red">
                        <i class="bi bi-check-lg"></i> Já Assisti!
                      </button>
                      <button onclick="abrirModalEditar(${filme.tmdb_id})" class="btn btn-sm btn-outline-warning">
                        <i class="bi bi-pencil-fill"></i> Editar
                      </button>
                      <button onclick="removerFilme(${filme.tmdb_id})" class="btn btn-sm btn-danger">
                        <i class="bi bi-trash-fill"></i> Remover
                      </button>
                    </div>
                  </td>
                </tr>
              `;
            });
          })
          .catch((err) => {
            exibirModalErro("Erro de ligação com a base de dados: " + err.message);
            container.innerHTML = `
              <tr>
                <td colspan="5" class="text-center text-secondary py-5">
                  <i class="bi bi-cloud-slash fs-1 text-danger d-block mb-3"></i>
                  <span>Não foi possível carregar a sua lista de desejos.</span>
                </td>
              </tr>
            `;
          });
      }

      function marcarComoAssistido(tmdbId) {
        const filme = filmesCarregados.find((f) => f.tmdb_id === tmdbId);
        if (!filme) return;

        const payload = {
          tmdb_id: filme.tmdb_id,
          titulo: filme.titulo,
          poster_path: filme.poster_path,
          ano: filme.ano,
          sinopse: "Filme movido da lista de desejos.", 
          status: "assistido",
          nota: 5 
        };

        fetch("/api/favoritar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        })
        .then((res) => {
          if (!res.ok) throw new Error("Não foi possível mover o filme.");
          return res.json();
        })
        .then(() => {
          obterFilmesParaAssistir();
        })
        .catch((err) => {
          exibirModalErro("Erro ao atualizar status: " + err.message);
        });
      }

      function abrirModalEditar(tmdbId) {
        const filme = filmesCarregados.find((f) => f.tmdb_id === tmdbId);
        if (!filme) return;

        document.getElementById("editTmdbId").value = filme.tmdb_id;
        document.getElementById("editTituloExibicao").value = filme.titulo;
        document.getElementById("editSinopse").value = filme.sinopse || '';

        document.getElementById("modalEditar").classList.add("mostrar");
      }

      function salvarEdicao(event) {
        event.preventDefault();

        const tmdbId = parseInt(document.getElementById("editTmdbId").value);
        const novaSinopse = document.getElementById("editSinopse").value.trim();

        const payload = {
          tmdb_id: tmdbId,
          status: "quero",
          nota: 0,
          sinopse: novaSinopse,
        };

        fetch("/api/favoritar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        })
          .then((res) => {
            if (!res.ok) throw new Error("Falha ao atualizar lembrete.");
            return res.json();
          })
          .then(() => {
            fecharModalEditar();
            obterFilmesParaAssistir();
          })
          .catch((err) => {
            fecharModalEditar();
            exibirModalErro("Erro ao atualizar: " + err.message);
          });
      }

      function removerFilme(tmdbId) {
        if (!confirm("Deseja remover este filme da sua lista de desejos?")) return;

        fetch("/api/remover", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ tmdb_id: tmdbId }),
        })
          .then((res) => {
            if (!res.ok) throw new Error("Não foi possível remover o registro.");
            return res.json();
          })
          .then(() => {
            obterFilmesParaAssistir();
          })
          .catch((err) => {
            exibirModalErro("Erro ao remover filme: " + err.message);
          });
      }
    </script>
  </body>
